name: Extract App Release
on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch Bundle Source
        run: |
          curl -L -o conduit-release.zip https://github.com/archive/refs/tags/v2.3.0.zip
          unzip conduit-release.zip
      - name: Upload Finished Artifact Container
        uses: actions/upload-artifact@v4
        with:
          name: conduit-app-package
          path: .
